<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>チャット</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
  font-family:sans-serif;
  background:#f5f5f5;
  padding:20px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
  font-size:16px;
}

#messages{
  margin-top:20px;
  background:white;
  border-radius:10px;
  padding:10px;
}

.msg{
  padding:10px;
  border-bottom:1px solid #ddd;
}

</style>
</head>
<body>

<h1>ログインチャット</h1>

<input id="nickname" placeholder="ニックネーム">
<input id="email" placeholder="メールアドレス">
<input id="password" type="password" placeholder="パスワード">

<button onclick="signUp()">新規登録</button>

<button onclick="login()">ログイン</button>

<button onclick="logout()">ログアウト</button>

<hr>

<input id="message" placeholder="メッセージ">

<button onclick="sendMessage()">送信</button>

<div id="messages"></div>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2'

const supabaseUrl =
'https://xorrwdceovxuhsbhhmkl.supabase.co'

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvcnJ3ZGNlb3Z4dWhzYmhobWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjU2MzMsImV4cCI6MjA5NDUwMTYzM30.2il0VMMzcpgLt4MC-qP2NGIubgbbeHRVnMdDPZz7wRI'

const supabase =
createClient(
  supabaseUrl,
  supabaseKey
)

alert("JS成功")

window.signUp = async function(){

  alert("登録ボタンOK")

  const email =
  document.getElementById("email").value

  const password =
  document.getElementById("password").value

  const { error } =
  await supabase.auth.signUp({
    email,
    password
  })

  if(error){
    alert(error.message)
    return
  }

  alert("登録成功")
}

window.login = async function(){

  alert("ログインボタンOK")

  const email =
  document.getElementById("email").value

  const password =
  document.getElementById("password").value

  const { error } =
  await supabase.auth.signInWithPassword({
    email,
    password
  })

  if(error){
    alert(error.message)
    return
  }

  alert("ログイン成功")
}

window.logout = async function(){

  await supabase.auth.signOut()

  alert("ログアウト成功")
}

window.sendMessage = async function(){

  alert("送信ボタンOK")

  const {
    data:{ user }
  } = await supabase.auth.getUser()

  if(!user){
    alert("ログインしてください")
    return
  }

  const text =
  document.getElementById("message").value

  const { error } =
  await supabase
  .from("messages")
  .insert([
    {
      text:text
    }
  ])

  if(error){
    alert(error.message)
    return
  }

  alert("送信成功")
}

</script>

</body>
</html>
