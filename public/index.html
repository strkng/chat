<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Realtime Chat</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #1e1f22;
      color: white;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #2b2d31;
    }

    h1 {
      margin: 0;
      padding: 16px;
      text-align: center;
      background: #232428;
      border-bottom: 1px solid #3f4147;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: #313338;
    }

    .message {
      background: #404249;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      word-break: break-word;
      font-size: 15px;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #232428;
      border-top: 1px solid #3f4147;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #1e1f22;
      color: white;
      outline: none;
      font-size: 16px;
    }

    input::placeholder {
      color: #999;
    }

    button {
      margin-left: 10px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #5865f2;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="chat-container">

  <h1>Realtime Chat</h1>

  <div id="messages"></div>

  <div class="input-area">
    <input id="msg" placeholder="メッセージを入力">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
  const socket = io();

  socket.on("receive_message", (data) => {
    const div = document.createElement("div");

    div.classList.add("message");
    div.innerText = data;

    document.getElementById("messages").appendChild(div);

    const messages = document.getElementById("messages");
    messages.scrollTop = messages.scrollHeight;
  });

  function sendMessage() {
    const input = document.getElementById("msg");

    if (input.value.trim() === "") return;

    socket.emit("send_message", input.value);

    input.value = "";
  }
</script>

</body>

</body>
</html>
