<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Login Chat</title>

  <style>
    body{
      font-family:sans-serif;
      max-width:600px;
      margin:auto;
      padding:20px;
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
      box-sizing:border-box;
    }

    button{
      margin-top:10px;
      padding:10px;
      cursor:pointer;
    }

    li{
      margin-top:10px;
      padding:10px;
      background:#f2f2f2;
      border-radius:10px;
      list-style:none;
    }
  </style>
</head>
<body>

<h1>ログインチャット</h1>

<input type="email" id="email" placeholder="メールアドレス">
<input type="password" id="password" placeholder="パスワード">

<button onclick="signUp()">新規登録</button>
<button onclick="login()">ログイン</button>
<button onclick="logout()">ログアウト</button>

<hr>

<input type="text" id="message" placeholder="メッセージ">
<button onclick="sendMessage()">送信</button>

<h2>メッセージ一覧</h2>

<ul id="messages"></ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseUrl =
'https://xorrwdceovxuhsbhhmkl.supabase.co';

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvcnJ3ZGNlb3Z4dWhzYmhobWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjU2MzMsImV4cCI6MjA5NDUwMTYzM30.2il0VMMzcpgLt4MC-qP2NGIubgbbeHRVnMdDPZz7wRI';

const client =
supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function signUp(){

  const email =
    document.getElementById('email').value;

  const password =
    document.getElementById('password').value;

  const { data, error } =
    await client.auth.signUp({
      email,
      password
    });

  if(error){

    alert(error.message);

  }else{

    alert('登録成功');

    alert(
      'あなたの識別ID:\n\n' +
      data.user.id
    );

    console.log(data.user);

  }

}

async function login(){

  const email =
    document.getElementById('email').value;

  const password =
    document.getElementById('password').value;

  const { error } =
    await client.auth.signInWithPassword({
      email,
      password
    });

  if(error){

    alert(error.message);

  }else{

    alert('ログイン成功');

    loadMessages();

  }

}

async function logout(){

  await client.auth.signOut();

  alert('ログアウトしました');

}

async function sendMessage(){

  const {
    data: { user }
  } = await client.auth.getUser();

  if(!user){

    alert('ログインしてください');

    return;

  }

  const text =
    document.getElementById('message').value;

  const { error } =
    await client
      .from('messages')
      .insert([
        {
          text:text,
          user_id:user.id
        }
      ]);

  if(error){

    alert(error.message);

    console.log(error);

  }else{

    document.getElementById('message').value='';

    loadMessages();

  }

}

async function loadMessages(){

  const { data, error } =
    await client
      .from('messages')
      .select('*')
      .order('id',{ascending:false});

  if(error){

    console.log(error);

    return;

  }

  const ul =
    document.getElementById('messages');

  ul.innerHTML='';

  data.forEach(msg=>{

    const li =
      document.createElement('li');

    li.innerHTML =
      '<b>ID:</b> ' +
      msg.user_id +
      '<br><br>' +
      msg.text;

    ul.appendChild(li);

  });

}

loadMessages();

</script>

</body>
</html>
