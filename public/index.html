<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Login Chat</title>
</head>
<body>

<h1>ログインチャット</h1>

<input type="email" id="email" placeholder="メール">
<input type="password" id="password" placeholder="パスワード">

<button onclick="signUp()">新規登録</button>
<button onclick="login()">ログイン</button>
<button onclick="logout()">ログアウト</button>

<hr>

<input type="text" id="message" placeholder="メッセージ">
<button onclick="sendMessage()">送信</button>

<h2>メッセージ</h2>
<ul id="messages"></ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = 'https://xorrwdceovxuhsbhhmkl.supabase.co';

const supabaseKey =
'YOUR_ANON_KEY';

const client = supabase.createClient(supabaseUrl, supabaseKey);

async function signUp() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await client.auth.signUp({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    alert('登録成功');
    console.log(data);

    alert('あなたのID:\n' + data.user.id);
  }
}

async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    alert('ログイン成功');
    loadMessages();
  }
}

async function logout() {
  await client.auth.signOut();
  alert('ログアウト');
}

async function sendMessage() {

  const {
    data: { user }
  } = await client.auth.getUser();

  if (!user) {
    alert('ログインしてください');
    return;
  }

  const text = document.getElementById('message').value;

  const { error } = await client
    .from('messages')
    .insert([
      {
        text: text,
        user_id: user.id
      }
    ]);

  if (error) {
    alert(error.message);
  } else {
    loadMessages();
  }
}

async function loadMessages() {

  const { data, error } = await client
    .from('messages')
    .select('*')
    .order('id', { ascending: false });

  const ul = document.getElementById('messages');

  ul.innerHTML = '';

  data.forEach(msg => {

    const li = document.createElement('li');

    li.textContent =
      msg.user_id + ' : ' + msg.text;

    ul.appendChild(li);

  });

}

loadMessages();
</script>

</body>
</html>
