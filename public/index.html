<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>チャット</title>

<style>
body{
  font-family:sans-serif;
  padding:20px;
  background:#f5f5f5;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  box-sizing:border-box;
}

button{
  padding:10px;
  margin-top:10px;
  margin-right:5px;
}

#messages{
  margin-top:20px;
  background:white;
  padding:10px;
  border-radius:10px;
}

.message{
  padding:8px;
  border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<h1>チャット</h1>

<input id="nickname" placeholder="ニックネーム">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signUp()">新規登録</button>
<button onclick="login()">ログイン</button>
<button onclick="logout()">ログアウト</button>

<hr>

<input id="message" placeholder="メッセージ">
<button onclick="sendMessage()">送信</button>

<div id="messages"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
window.onerror = function(msg){
  alert(msg)
}
const supabaseUrl =
"https://xorrwdceovxuhsbhhmkl.supabase.co"

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvcnJ3ZGNlb3Z4dWhzYmhobWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjU2MzMsImV4cCI6MjA5NDUwMTYzM30.2il0VMMzcpgLt4MC-qP2NGIubgbbeHRVnMdDPZz7wRI"

const supabase =
window.supabase.createClient(
  supabaseUrl,
  supabaseKey
)

alert("Supabase connected")

async function signUp(){

  const email =
    document.getElementById("email").value

  const password =
    document.getElementById("password").value

  const nickname =
    document.getElementById("nickname").value

  const { data, error } =
    await supabase.auth.signUp({
      email,
      password
    })

  if(error){
    alert(error.message)
    return
  }

  const user = data.user

  if(user){

    await supabase
      .from("profiles")
      .insert([
        {
          id:user.id,
          nickname:nickname,
          is_admin:false
        }
      ])

    alert("新規登録成功")
  }
}

async function login(){

  const email =
    document.getElementById("email").value

  const password =
    document.getElementById("password").value

  const { error } =
    await supabase.auth.signInWithPassword({
      email,
      password
    })

  if(error){
    alert(error.message)
  }else{
    alert("ログイン成功")
    loadMessages()
  }
}

async function logout(){

  await supabase.auth.signOut()

  alert("ログアウトしました")
}

async function sendMessage(){

  const {
    data:{user}
  } = await supabase.auth.getUser()

  if(!user){
    alert("ログインしてください")
    return
  }

  const text =
    document.getElementById("message").value

  const { data:profile } =
    await supabase
      .from("profiles")
      .select("*")
      .eq("id",user.id)
      .single()

  await supabase
    .from("messages")
    .insert([
      {
        text:text,
        user_id:user.id,
        nickname:profile.nickname
      }
    ])

  document.getElementById("message").value = ""

  loadMessages()
}

async function loadMessages(){

  const { data } =
    await supabase
      .from("messages")
      .select("*")
      .order("created_at",{ascending:true})

  const messages =
    document.getElementById("messages")

  messages.innerHTML = ""

  data.forEach(msg=>{

    const div =
      document.createElement("div")

    div.className = "message"

    div.innerHTML =
      "<b>" +
      (msg.nickname || "名無し") +
      "</b> : " +
      msg.text

    messages.appendChild(div)
  })
}

loadMessages()

window.signUp = signUp
window.login = login
window.logout = logout
window.sendMessage = sendMessage

</script>

</body>
</html>
