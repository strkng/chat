<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Realtime Chat</title>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050816;
      font-family:sans-serif;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:10px;
      overflow:hidden;
    }

    .chat-container{
      width:100%;
      max-width:700px;
      height:95vh;
      background:#0d1025;
      border-radius:24px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 0 30px rgba(0,0,0,0.4);
    }

    .header{
      padding:28px;
      font-size:2rem;
      font-weight:bold;
      color:white;
      border-bottom:1px solid rgba(255,255,255,0.08);
      background:linear-gradient(to right,#0d1025,#11142f);
    }

    #messages{
      flex:1;
      overflow-y:auto;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .message{
      background:#5865f2;
      color:white;
      padding:12px 16px;
      border-radius:16px;
      max-width:80%;
      word-wrap:break-word;
      animation:fade 0.2s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .input-area{
      display:flex;
      gap:10px;
      padding:16px;
      border-top:1px solid rgba(255,255,255,0.08);
      background:#0b0e22;
    }

    #input{
      flex:1;
      padding:14px;
      border:none;
      border-radius:16px;
      background:#1a1f3a;
      color:white;
      font-size:1rem;
      outline:none;
    }

    #input::placeholder{
      color:#aaa;
    }

    #send{
      border:none;
      background:#5865f2;
      color:white;
      padding:0 20px;
      border-radius:16px;
      font-size:1rem;
      cursor:pointer;
      transition:0.2s;
    }

    #send:hover{
      opacity:0.85;
    }

    @media(max-width:600px){

      .chat-container{
        height:100vh;
        border-radius:0;
      }

      .header{
        font-size:1.8rem;
        padding:22px;
      }

      #send{
        padding:0 16px;
      }
    }
  </style>
</head>
<body>

<div class="chat-container">

  <div class="header">
    Realtime Chat
  </div>

  <div id="messages"></div>

  <div class="input-area">
    <input id="input" placeholder="message"/>
    <button id="send">Send</button>
  </div>

</div>

<script>
const socket = io();

const SUPABASE_URL =
"https://xorrwdceovxuhsbhhmkl.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvcnJ3ZGNlb3Z4dWhzYmhobWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjU2MzMsImV4cCI6MjA5NDUwMTYzM30.2il0VMMzcpgLt4MC-qP2NGIubgbbeHRVnMdDPZz7wRI";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const messages = document.getElementById("messages");
const input = document.getElementById("input");
const send = document.getElementById("send");

function addMessage(text){
  const div = document.createElement("div");

  div.className = "message";
  div.innerText = text;

  messages.appendChild(div);

  messages.scrollTop = messages.scrollHeight;
}

async function loadMessages(){

  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .order("id",{ ascending:true });

  if(data){

    messages.innerHTML = "";

    data.forEach(msg=>{
      addMessage(msg.text);
    });
  }
}

loadMessages();

send.onclick = ()=>{

  const text = input.value.trim();

  if(!text) return;

  socket.emit("chat message",text);

  input.value = "";
};

input.addEventListener("keypress",(e)=>{
  if(e.key === "Enter"){
    send.click();
  }
});

socket.on("chat message", async (msg)=>{

  addMessage(msg);

  await supabase
    .from("messages")
    .insert([
      { text: msg }
    ]);
});
</script>

</body>
</html>
