<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログインチャット</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 16px;
      margin-right: 5px;
      font-size: 16px;
    }

    #messages {
      margin-top: 20px;
      border: 1px solid #ccc;
      padding: 10px;
      height: 250px;
      overflow-y: auto;
    }

    #admin {
      color: red;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>ログインチャット</h1>

  <input id="nickname" placeholder="ニックネーム">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signUp()">新規登録</button>
  <button onclick="login()">ログイン</button>
  <button onclick="logout()">ログアウト</button>

  <div id="userInfo"></div>
  <div id="admin"></div>

  <hr>

  <input id="messageInput" placeholder="メッセージ">
  <button onclick="sendMessage()">送信</button>

  <div id="messages"></div>

  <script>
    const supabaseUrl = "https://xorrwdceovxuhsbhhmkl.supabase.co"

    const supabaseKey = "YOUR_ANON_KEY"

    const supabase = window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    )

    async function signUp() {
      const email = document.getElementById("email").value
      const password = document.getElementById("password").value
      const nickname = document.getElementById("nickname").value

      const { data, error } = await supabase.auth.signUp({
        email,
        password
      })

      if (error) {
        alert(error.message)
        return
      }

      const user = data.user

      if (user) {
        const { error: profileError } = await supabase
          .from("profiles")
          .insert([
            {
              id: user.id,
              nickname: nickname
            }
          ])

        if (profileError) {
          alert(profileError.message)
          return
        }

        alert("登録成功！")
      }
    }

    async function login() {
      const email = document.getElementById("email").value
      const password = document.getElementById("password").value

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      })

      if (error) {
        alert(error.message)
        return
      }

      const { data: profile } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", data.user.id)
        .single()

      document.getElementById("userInfo").innerText =
        "ログイン中: " + profile.nickname

      if (profile.is_admin) {
        document.getElementById("admin").innerText = "👑 Admin"
      } else {
        document.getElementById("admin").innerText = ""
      }

      loadMessages()

      alert("ログイン成功！")
    }

    async function logout() {
      await supabase.auth.signOut()

      document.getElementById("userInfo").innerText = ""
      document.getElementById("admin").innerText = ""

      alert("ログアウトしました")
    }

    async function sendMessage() {
      const message = document.getElementById("messageInput").value

      const {
        data: { user }
      } = await supabase.auth.getUser()

      if (!user) {
        alert("ログインしてください")
        return
      }

      const { data: profile } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .single()

      await supabase
        .from("messages")
        .insert([
          {
            text: profile.nickname + ": " + message
          }
        ])

      document.getElementById("messageInput").value = ""

      loadMessages()
    }

    async function loadMessages() {
      const { data } = await supabase
        .from("messages")
        .select("*")
        .order("id", { ascending: true })

      const messagesDiv = document.getElementById("messages")

      messagesDiv.innerHTML = ""

      data.forEach(msg => {
        const div = document.createElement("div")
        div.innerText = msg.text
        messagesDiv.appendChild(div)
      })
    }

    loadMessages()
  </script>

</body>
</html>
