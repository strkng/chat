<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Realtime Chat</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f1117;
  font-family:sans-serif;
  color:white;

  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  padding:12px;
}

.chat-container{
  width:100%;
  max-width:700px;
  height:90vh;

  background:#1a1d29;
  border-radius:20px;

  display:flex;
  flex-direction:column;

  overflow:hidden;

  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.header{
  padding:20px;
  font-size:28px;
  font-weight:bold;

  background:#161822;
  border-bottom:1px solid #2d3142;
}

.messages{
  flex:1;
  padding:16px;

  overflow-y:auto;
}

.message{
  background:#5865f2;
  padding:12px 16px;
  border-radius:14px;

  margin-bottom:10px;

  width:fit-content;
  max-width:80%;

  word-break:break-word;
}

.input-area{
  display:flex;
  gap:10px;

  padding:14px;

  background:#161822;
  border-top:1px solid #2d3142;
}

input{
  flex:1;

  background:#232735;
  border:none;

  color:white;

  padding:14px;
  border-radius:12px;

  outline:none;

  font-size:16px;
}

button{
  border:none;

  background:#5865f2;
  color:white;

  padding:14px 20px;

  border-radius:12px;

  font-size:16px;

  cursor:pointer;
}

button:hover{
  opacity:0.9;
}
</style>
</head>

<body>

<div class="chat-container">

  <div class="header">
    Realtime Chat
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="message">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
function sendMessage(){
  const input = document.getElementById("messageInput");
  const messages = document.getElementById("messages");

  if(input.value.trim() === "") return;

  const msg = document.createElement("div");
  msg.className = "message";
  msg.textContent = input.value;

  messages.appendChild(msg);

  input.value = "";

  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
