<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ログインチャット</title>

<style>

body{
  font-family:sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
}

h1{
  font-size:48px;
  margin-bottom:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 0 10px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:15px;
  margin-top:10px;
  border-radius:15px;
  border:1px solid #ccc;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:15px;
  background:black;
  color:white;
  font-size:17px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.hidden{
  display:none;
}

#status{
  font-weight:bold;
  margin-bottom:15px;
}

.message{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

.nickname{
  font-weight:bold;
  margin-bottom:5px;
}

</style>
</head>

<body>

<div class="container">

<h1>ログインチャット</h1>

<div id="status">
未ログイン
</div>

<!-- TOP -->

<div id="topPage" class="card">

<button onclick="showRegister()">
新規登録
</button>

<button onclick="showLogin()">
ログイン
</button>

<button onclick="logout()">
ログアウト
</button>

</div>

<!-- REGISTER -->

<div id="registerPage"
class="card hidden">

<h2>新規登録</h2>

<input
id="registerNickname"
placeholder="ニックネーム">

<input
id="registerEmail"
placeholder="メールアドレス">

<input
id="registerPassword"
type="password"
placeholder="パスワード">

<button onclick="signUp()">
登録する
</button>

<button onclick="backTop()">
戻る
</button>

</div>

<!-- LOGIN -->

<div id="loginPage"
class="card hidden">

<h2>ログイン</h2>

<input
id="loginEmail"
placeholder="メールアドレス">

<input
id="loginPassword"
type="password"
placeholder="パスワード">

<button onclick="login()">
ログインする
</button>

<button onclick="backTop()">
戻る
</button>

</div>

<!-- CHAT -->

<div class="card">

<input
id="message"
placeholder="メッセージ">

<button onclick="sendMessage()">
送信
</button>

</div>

<div id="messages"></div>

</div>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2'

const supabaseUrl =
'https://xorrwdceovxuhsbhhmkl.supabase.co'

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvcnJ3ZGNlb3Z4dWhzYmhobWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjU2MzMsImV4cCI6MjA5NDUwMTYzM30.2il0VMMzcpgLt4MC-qP2NGIubgbbeHRVnMdDPZz7wRI'

const supabase =
createClient(
  supabaseUrl,
  supabaseKey
)

window.showRegister = function(){

  document.getElementById(
    "topPage"
  ).classList.add("hidden")

  document.getElementById(
    "registerPage"
  ).classList.remove("hidden")
}

window.showLogin = function(){

  document.getElementById(
    "topPage"
  ).classList.add("hidden")

  document.getElementById(
    "loginPage"
  ).classList.remove("hidden")
}

window.backTop = function(){

  document.getElementById(
    "topPage"
  ).classList.remove("hidden")

  document.getElementById(
    "registerPage"
  ).classList.add("hidden")

  document.getElementById(
    "loginPage"
  ).classList.add("hidden")
}

window.signUp = async function(){

  const nickname =
  document.getElementById(
    "registerNickname"
  ).value

  const email =
  document.getElementById(
    "registerEmail"
  ).value

  const password =
  document.getElementById(
    "registerPassword"
  ).value

  const { data, error } =
  await supabase.auth.signUp({
    email,
    password
  })

  if(error){
    alert(error.message)
    return
  }

  await supabase
  .from("profiles")
  .insert([
    {
      id:data.user.id,
      nickname:nickname
    }
  ])

  alert("新規登録成功")

  backTop()
}

window.login = async function(){

  const email =
  document.getElementById(
    "loginEmail"
  ).value

  const password =
  document.getElementById(
    "loginPassword"
  ).value

  const { data, error } =
  await supabase.auth.signInWithPassword({
    email,
    password
  })

  if(error){
    alert(error.message)
    return
  }

  const { data:profile } =
  await supabase
  .from("profiles")
  .select("*")
  .eq("id", data.user.id)
  .single()

  document.getElementById(
    "status"
  ).innerText =
  "ログイン中: " +
  profile.nickname

  alert("ログイン成功")

  loadMessages()

  backTop()
}

window.logout = async function(){

  await supabase.auth.signOut()

  document.getElementById(
    "status"
  ).innerText =
  "未ログイン"

  alert("ログアウトしました")
}

window.sendMessage = async function(){

  const {
    data:{ user }
  } =
  await supabase.auth.getUser()

  if(!user){
    alert("ログインしてください")
    return
  }

  const text =
  document.getElementById(
    "message"
  ).value

  if(text.trim() === ""){
    alert("メッセージを入力してください")
    return
  }

  const { data:profile } =
  await supabase
  .from("profiles")
  .select("*")
  .eq("id", user.id)
  .single()

  const { error } =
  await supabase
  .from("messages")
  .insert([
    {
      text:text,
      nickname:profile.nickname,
      user_id:user.id
    }
  ])

  if(error){
    alert(error.message)
    return
  }

  document.getElementById(
    "message"
  ).value = ""

  loadMessages()
}

async function loadMessages(){

  const { data } =
  await supabase
  .from("messages")
  .select("*")
  .order(
    "created_at",
    {ascending:false}
  )

  const messages =
  document.getElementById(
    "messages"
  )

  messages.innerHTML = ""

  data.forEach(msg=>{

    messages.innerHTML += `
      <div class="message">

        <div class="nickname">
          ${msg.nickname || "名無し"}
        </div>

        <div>
          ${msg.text}
        </div>

      </div>
    `
  })
}

loadMessages()

</script>

</body>
</html>
