<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supabase Chat</title>
</head>
<body>

  <h1>メッセージ送信</h1>

  <input type="text" id="message" placeholder="メッセージ入力">
  <button onclick="sendMessage()">送信</button>

  <h2>メッセージ一覧</h2>
  <ul id="messages"></ul>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseUrl = 'https://xorrwdceovxuhsbhhmkl.supabase.co';

    const supabaseKey =
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvcnJ3ZGNlb3Z4dWhzYmhobWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjU2MzMsImV4cCI6MjA5NDUwMTYzM30.2il0VMMzcpgLt4MC-qP2NGIubgbbeHRVnMdDPZz7wRI';

    const client = supabase.createClient(supabaseUrl, supabaseKey);

    async function sendMessage() {
      const text = document.getElementById('message').value;

      const { error } = await client
        .from('messages')
        .insert([{ text: text }]);

      if (error) {
        alert('エラー: ' + error.message);
        console.log(error);
      } else {
        alert('送信成功');
        loadMessages();
      }
    }

    async function loadMessages() {
      const { data, error } = await client
        .from('messages')
        .select('*')
        .order('id', { ascending: false });

      const ul = document.getElementById('messages');
      ul.innerHTML = '';

      data.forEach(msg => {
        const li = document.createElement('li');
        li.textContent = msg.text;
        ul.appendChild(li);
      });
    }

    loadMessages();
  </script>

</body>
</html>
