<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ログインチャット</title>

<style>

body{
  font-family:sans-serif;
  background:#f5f5f5;
  padding:20px;
}

h1{
  font-size:50px;
}

input{
  width:100%;
  padding:15px;
  margin-top:10px;
  border-radius:15px;
  border:1px solid #ccc;
  box-sizing:border-box;
  font-size:16px;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:15px;
  background:black;
  color:white;
  font-size:18px;
}

#status{
  margin-top:15px;
  font-weight:bold;
  font-size:16px;
}

#messages{
  margin-top:20px;
}

.msg{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

.nickname{
  font-weight:bold;
  margin-bottom:5px;
}

</style>
</head>
<body>

<h1>ログインチャット</h1>

<input id="nickname" placeholder="ニックネーム">

<input id="email" placeholder="メールアドレス">

<input id="password" type="password" placeholder="パスワード">

<button onclick="signUp()">新規登録</button>

<button onclick="login()">ログイン</button>

<button onclick="logout()">ログアウト</button>

<hr>

<input id="message" placeholder="メッセージ">

<button onclick="sendMessage()">送信</button>

<div id="status"></div>

<div id="messages"></div>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2'

const supabaseUrl =
'https://xorrwdceovxuhsbhhmkl.supabase.co'

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvcnJ3ZGNlb3Z4dWhzYmhobWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjU2MzMsImV4cCI6MjA5NDUwMTYzM30.2il0VMMzcpgLt4MC-qP2NGIubgbbeHRVnMdDPZz7wRI'

const supabase =
createClient(
  supabaseUrl,
  supabaseKey
)

function showStatus(
  text,
  color="red"
){

  const status =
  document.getElementById("status")

  status.innerText = text
  status.style.color = color
}

window.signUp = async function(){

  const nickname =
  document.getElementById("nickname").value

  const email =
  document.getElementById("email").value

  const password =
  document.getElementById("password").value

  const { data, error } =
  await supabase.auth.signUp({
    email,
    password
  })

  if(error){
    showStatus(error.message)
    return
  }

  if(data.user){

    await supabase
    .from("profiles")
    .insert([
      {
        id:data.user.id,
        nickname:nickname
      }
    ])

    showStatus(
      "新規登録成功",
      "green"
    )
  }
}

window.login = async function(){

  const email =
  document.getElementById("email").value

  const password =
  document.getElementById("password").value

  const { data, error } =
  await supabase.auth.signInWithPassword({
    email,
    password
  })

  if(error){
    showStatus(error.message)
    return
  }

  showStatus(
    "ログイン成功",
    "green"
  )
}

window.logout = async function(){

  await supabase.auth.signOut()

  showStatus(
    "ログアウトしました",
    "green"
  )
}

window.sendMessage = async function(){

  const {
    data:{ user }
  } = await supabase.auth.getUser()

  if(!user){
    showStatus("ログインしてください")
    return
  }

  const text =
  document.getElementById("message").value

  if(text.trim() === ""){
    showStatus("メッセージを入力してください")
    return
  }

  const { data:profile } =
  await supabase
  .from("profiles")
  .select("nickname")
  .eq("id",user.id)
  .single()

  const nickname =
  profile?.nickname || "名無し"

  const { error } =
  await supabase
  .from("messages")
  .insert([
    {
      text:text,
      nickname:nickname,
      user_id:user.id
    }
  ])

  if(error){
    showStatus(error.message)
    return
  }

  showStatus(
    "送信成功",
    "green"
  )

  document.getElementById("message").value = ""

  loadMessages()
}

async function loadMessages(){

  const { data, error } =
  await supabase
  .from("messages")
  .select("*")
  .order(
    "created_at",
    {ascending:false}
  )

  if(error){
    showStatus(error.message)
    return
  }

  const div =
  document.getElementById("messages")

  div.innerHTML = ""

  data.forEach(msg=>{

    div.innerHTML += `
      <div class="msg">
        <div class="nickname">
          ${msg.nickname || "名無し"}
        </div>
        <div>
          ${msg.text}
        </div>
      </div>
    `
  })
}

loadMessages()

</script>

</body>
</html>
