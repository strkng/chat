<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supabase Chat</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }

    #messages {
      list-style: none;
      padding: 20px;
      margin: 0;
      height: 80vh;
      overflow-y: auto;
    }

    #messages li {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    form {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: white;
      padding: 10px;
      box-sizing: border-box;
    }

    #input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      margin-left: 10px;
    }
  </style>
</head>
<body>

  <ul id="messages"></ul>

  <form id="form">
    <input id="input" autocomplete="off" placeholder="メッセージ"/>
    <button>送信</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const SUPABASE_URL = "https://xorrwdceovxuhsbhhmkl.supabase.co";

    const SUPABASE_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvcnJ3ZGNlb3Z4dWhzYmhobWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjU2MzMsImV4cCI6MjA5NDUwMTYzM30.2il0VMMzcpgLt4MC-qP2NGIubgbbeHRVnMdDPZz7wRI";

    const supabase = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");

    async function loadMessages() {
      const { data, error } = await supabase
        .from("messages")
        .select("*")
        .order("id", { ascending: true });

      if (error) {
        console.error(error);
        return;
      }

      messages.innerHTML = "";

      data.forEach(msg => {
        const li = document.createElement("li");
        li.textContent = msg.text;
        messages.appendChild(li);
      });
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!input.value) return;

      const { error } = await supabase
        .from("messages")
        .insert([{ text: input.value }]);

      if (error) {
        console.error(error);
        return;
      }

      input.value = "";
      loadMessages();
    });

    loadMessages();

    supabase
      .channel('messages-channel')
      .on(
        'postgres_changes',
        {
          event: '*',
          schema: 'public',
          table: 'messages'
        },
        () => {
          loadMessages();
        }
      )
      .subscribe();
  </script>

</body>
</html>
